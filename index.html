<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph Hierarchy Analyzer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Graph Hierarchy Analyzer</h1>
      <p>Enter edges to build hierarchy trees and detect invalid entries, duplicates, and cycles.</p>
      <p class="endpoint">API: <code>POST /api/graph</code></p>

      <form id="graph-form">
        <label for="edges">Graph edges</label>
        <textarea id="edges" spellcheck="false" placeholder="A->B&#10;A->C&#10;B->D"></textarea>
        <p class="help">Use one edge per line or separate edges with commas. Format: <code>X-&gt;Y</code>.</p>

        <div class="actions">
          <button type="submit">Analyze</button>
          <button type="button" id="load-example">Load example</button>
          <span id="edge-count">0 entries</span>
        </div>
        <p id="error" class="error" role="alert"></p>
      </form>

      <section class="output" aria-live="polite">
        <h2>Result <small id="status">Ready</small></h2>
        <p id="empty-state">Submit graph edges to view the result.</p>
        <div id="results" hidden></div>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
